<!DOCTYPE html>
<html lang="pl">
 
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
 
<body>
    <h1>Moje ulubione filmy</h1>
 
    {# loop.index zwraca numer aktualnej iteracji pętli, liczony od 1.
       Sprawdzamy, czy jest parzysty, żeby pokolorować co drugi element. #}
    <ul>
        {% for film in movies %}
            {% if loop.index % 2 == 0 %}
            <li class="even">{{ film }}</li>
            {% else %}
            <li class="odd">{{ film }}</li>
            {% endif %}
        {% endfor %}
    </ul>
 
    <style>
        .even {
            background-color: #e8f0fe;
        }
        .odd {
            background-color: #ffffff;
        }
    </style>
</body>
 
</html>
