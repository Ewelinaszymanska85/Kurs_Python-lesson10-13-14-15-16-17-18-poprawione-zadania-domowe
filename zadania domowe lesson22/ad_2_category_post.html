{# blog/templates/blog/category_posts.html #}

{% extends "base.html" %}

{% block content %}

<h1>Kategoria: {{ category.name }}</h1>

{% if posts %}
    <ul class="list-group">
        {% for post in posts %}
            <li class="list-group-item">{{ post.title }}</li>
        {% endfor %}
    </ul>
{% else %}
    <p>Brak postów w tej kategorii.</p>
{% endif %}

{% endblock %}
